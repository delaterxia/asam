<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Удивляй, надевай</title>
    <link rel="stylesheet" href="css/header.css">
    <style>
        :root {
            --panel-bg: rgba(12, 28, 23, 0.56);
            --line: rgba(224, 244, 229, 0.26);
            --text: #eff8f2;
            --muted: rgba(238, 248, 242, 0.72);
            --btn-bg: #09120f;
            --btn-bg-hover: #0f1b17;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            min-height: 100vh;
            background:
                linear-gradient(rgba(6, 19, 15, 0.48), rgba(6, 19, 15, 0.48)),
                url("https://sun9-34.userapi.com/s/v1/ig2/KA2skPNSWbcKR_-HmveXH9To36jI4n2eipnko5skKfbDDnliAly6x8rsYDtHZ5V_qF83oQubQEZUjq_wI9udbuwN.jpg?quality=95&as=32x26,48x38,72x58,108x86,160x128,240x192,360x288,480x384,540x432,640x512,720x576,800x640&from=bu&u=s77q9ZYMOLJ_6Cv6Mh15rwyz0hfcBU1ZhOOGnZgpFjc&cs=800x0") center/cover no-repeat fixed;
        }

        .auth-shell {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 132px 20px 42px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            width: min(920px, 100%);
            min-height: min(72vh, 620px);
            display: grid;
            grid-template-columns: 1fr;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(20, 20, 20, 0.35);
            border: 1px solid rgba(211, 211, 211, 0.12);
            border-right: 1px solid rgba(173, 173, 173, 0.12);
            backdrop-filter: blur(6px);
        }

        .auth-card__media {
            display: none; /* убираем левую/медиа-зону */
            background:
                linear-gradient(rgba(4, 14, 11, 0.18), rgba(4, 14, 11, 0.18)),
                url("https://images.unsplash.com/photo-1524594154908-edd70f7f86ad?auto=format&fit=crop&w=1300&q=80") center/cover no-repeat;
        }

        .auth-card__form {
            background: transparent;
            padding: clamp(24px, 4vw, 38px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            backdrop-filter: blur(9px);
        }

        .auth-title {
            margin: 0 0 8px;
            font-size: clamp(1.8rem, 3.2vw, 2.35rem);
            font-weight: 700;
        }

        .auth-subtitle {
            margin: 0 0 26px;
            color: var(--muted);
            font-size: 0.98rem;
        }

        .auth-label {
            font-size: 0.95rem;
            color: var(--text);
            margin-bottom: 6px;
            display: block;
        }

        .auth-input {
            width: 100%;
            box-sizing: border-box;
            border: 0;
            border-bottom: 1px solid var(--line);
            background: transparent;
            color: var(--text);
            font-size: 1rem;
            padding: 10px 0;
            margin-bottom: 18px;
            outline: none;
        }

        .auth-input::placeholder {
            color: rgba(232, 247, 239, 0.55);
        }

        .auth-input:focus {
            border-bottom-color: rgba(242, 253, 246, 0.88);
        }

        .auth-submit {
            width: 100%;
            border: 0;
            border-radius: 8px;
            padding: 12px 14px;
            background: var(--btn-bg);
            color: var(--text);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 6px;
        }

        .auth-submit:hover {
            background: var(--btn-bg-hover);
        }

        .auth-bottom {
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
            text-align: center;
        }

        .auth-link {
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }

        .auth-link:hover {
            border-bottom-color: rgba(239, 248, 242, 0.78);
        }

        .auth-message {
            margin: 10px 0 0;
            min-height: 1.4em;
            color: #e6f8ee;
            font-size: 0.92rem;
        }

        .auth-message.is-error {
            color: #ffd0cb;
        }

        @media (max-width: 860px) {
            .auth-card {
                grid-template-columns: 1fr;
            }

            .auth-card__media {
                min-height: 210px;
                order: -1;
            }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <main class="auth-shell">
        <section class="auth-card" aria-label="Регистрация">
            <div class="auth-card__form">
                <h1 class="auth-title">Создать аккаунт</h1>
                <p class="auth-subtitle">Заполните данные для продолжения.</p>

                <form id="register-form">
                    <label class="auth-label" for="register-name">Имя</label>
                    <input id="register-name" class="auth-input" type="text" placeholder="Введите имя" autocomplete="name" required>

                    <label class="auth-label" for="register-email">Эл. почта</label>
                    <input id="register-email" class="auth-input" type="email" placeholder="Введите эл. почту" autocomplete="email" required>

                    <label class="auth-label" for="register-password">Пароль</label>
                    <input id="register-password" class="auth-input" type="password" placeholder="******" autocomplete="new-password" required>

                    <button type="submit" class="auth-submit">Зарегистрироваться</button>
                </form>

                <p class="auth-bottom">Уже есть аккаунт? <a class="auth-link" href="login.html">Войти</a></p>
                <p id="auth-message" class="auth-message" role="status" aria-live="polite"></p>
            </div>
            <div class="auth-card__media" aria-hidden="true"></div>
        </section>
    </main>

    <script>
        fetch("assets/header.html")
            .then(function (response) { return response.text(); })
            .then(function (data) {
                var headerEl = document.getElementById("header-container");
                if (headerEl) headerEl.innerHTML = data;
            });

        (function () {
            var messageEl = document.getElementById("auth-message");
            var form = document.getElementById("register-form");
            var authKey = "asam_auth_user";

            function showMessage(text, isError) {
                messageEl.textContent = text;
                messageEl.classList.toggle("is-error", !!isError);
            }

            form.addEventListener("submit", function (event) {
                event.preventDefault();

                var name = document.getElementById("register-name").value.trim();
                var email = document.getElementById("register-email").value.trim().toLowerCase();
                var password = document.getElementById("register-password").value;
                if (!name || !email || !password) {
                    showMessage("Заполните все поля.", true);
                    return;
                }

                localStorage.setItem(authKey, JSON.stringify({
                    name: name,
                    email: email,
                    password: password
                }));
                showMessage("Аккаунт создан. Переходим к авторизации...", false);
                window.setTimeout(function () {
                    window.location.href = "login.html";
                }, 400);
            });
        })();
    </script>
</body>
</html>
